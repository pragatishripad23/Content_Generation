# Render Blueprint - Deploy both Backend and Frontend services
# Documentation: https://render.com/docs/blueprint-spec

services:
  # Backend API Service (FastAPI + Python)
  - type: web
    name: solis-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      cd backend && pip install -r requirements.txt
    startCommand: |
      cd backend && gunicorn server:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: solisboard
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://solis-frontend.onrender.com,http://localhost:3000
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: FAL_KEY
        sync: false
    healthCheckPath: /api/

  # Frontend Static Site (React)
  - type: web
    name: solis-frontend
    runtime: static
    region: oregon
    plan: free
    buildCommand: |
      cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: REACT_APP_BACKEND_URL
        value: https://solis-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
